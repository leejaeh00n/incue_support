<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>INCUE サポート</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans JP', 'Hiragino Kaku Gothic ProN',
          'Yu Gothic', 'Meiryo', sans-serif;
        background: #ffffff;
        color: #111827;
      }
      .wrap {
        max-width: 760px;
        padding: 32px 16px;
        margin: 0 auto;
      }
      .hero {
        background: linear-gradient(90deg, #0d9488 0%, #06b6d4 100%);
        border-radius: 18px;
        padding: 22px 18px;
        color: #ffffff;
      }
      h1 {
        font-size: 22px;
        margin: 0 0 8px 0;
      }
      p {
        margin: 8px 0;
        line-height: 1.7;
      }
      .card {
        margin-top: 18px;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        padding: 18px;
        background: #ffffff;
      }
      .emailLabel {
        font-size: 14px;
        color: #374151;
      }
      .email {
        margin-top: 10px;
        font-size: 16px;
        font-weight: 700;
      }
      a {
        color: #0d9488;
        text-decoration: none;
        word-break: break-word;
      }
      a:hover {
        text-decoration: underline;
      }
      .note {
        margin-top: 14px;
        font-size: 13px;
        color: #4b5563;
      }
      .footer {
        margin-top: 24px;
        font-size: 12px;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="hero">
        <h1>INCUE サポート</h1>
        <p>ご不明点やお問い合わせは、下記メールアドレスまでお願いします。</p>
      </div>

      <div class="card">
        <div class="emailLabel">お問い合わせ先</div>
        <div class="email">
          <a href="mailto:incue.official.team@gmail.com">incue.official.team@gmail.com</a>
        </div>
        <div class="note">※スパム防止のため、返信には数日かかる場合があります。</div>
      </div>

      <div class="card">
        <div class="emailLabel">プライバシーポリシー</div>
        <p class="note" style="margin-top: 10px;">
          <a href="/privacy-policy.html">個人情報保護方針（Privacy Policy）を表示</a>
        </p>
      </div>

      <div class="footer">© 2026 INCUE</div>
    </div>
  </body>
</html>
